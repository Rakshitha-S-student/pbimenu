<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Finance Dashboard</title>

<!-- EXACT ORIGINAL CSS — unchanged -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/bhavinks84/PBIMenu@main/styles.css">

</head>
<body>

<header class="header">
  <div class="header-left">
    <img src="https://cdn.prod.website-files.com/6407c59e84f33c748dd90e1d/64f88dfd7a42611aa2e67dca_masreq-p-2000.png" class="header-logo" alt="Mashreq">
    <h1 class="header-title">Finance Dashboard</h1>
  </div>
  <div class="search-container">
    <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" class="search-input" placeholder="Search dashboards... (Ctrl+K)">
    <button id="searchClear" class="search-clear">✕</button>
  </div>
</header>

<main class="accordion-container" id="accordionContainer"></main>
<div id="resultsCount" class="search-results-count"></div>

<script>
// Read MENU_DATA passed via URL parameter from Power BI DAX
(function() {
  try {
    var params = new URLSearchParams(window.location.search);
    var raw = params.get('data');
    if (raw) {
      window.MENU_DATA = JSON.parse(decodeURIComponent(raw));
    }
  } catch(e) {
    console.warn('Menu data parse error:', e);
  }
})();
</script>

<!-- EXACT ORIGINAL SCRIPT.JS — unchanged -->
<script src="https://cdn.jsdelivr.net/gh/bhavinks84/PBIMenu@main/script.js"></script>

<script>
// Single click fix — works because this page is on GitHub Pages, NOT inside PBI sandbox
(function () {

  function patchCards() {
    document.querySelectorAll('.dashboard-card:not([data-patched])').forEach(function(card) {
      card.setAttribute('data-patched', '1');
      var url = (card.getAttribute('href') || '').trim();

      if (!url || url === '#') {
        card.style.opacity = '0.5';
        card.style.cursor = 'not-allowed';
        card.removeAttribute('href');
        return;
      }

      card.setAttribute('href', url);
      card.setAttribute('target', '_blank');
      card.setAttribute('rel', 'noopener noreferrer');

      card.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        window.open(url, '_blank');
      });
    });
  }

  var attempts = 0;
  var timer = setInterval(function() {
    patchCards();
    if (++attempts >= 50) clearInterval(timer);
  }, 100);

  document.addEventListener('click', function() {
    setTimeout(patchCards, 300);
  }, true);

})();
</script>

</body>
</html>
